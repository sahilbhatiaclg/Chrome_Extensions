<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Dashboard</title>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <div class="sidebar">
    <div class="brand">
      <span>📚</span>
      <span>StudyTracker</span>
    </div>
    <nav>
      <a class="nav-link active" data-tab="overview">📊 Overview</a>
      <a class="nav-link" data-tab="subjects">📖 Subjects</a>
      <a class="nav-link" data-tab="topics">📝 Topic Log</a>
      <a class="nav-link" data-tab="goals">🎯 Goals</a>
    </nav>
    <div class="sidebar-footer">
      <button id="clearDataBtn" class="clear-btn">🗑 Clear All Data</button>
    </div>
  </div>

  <div class="main">

    <!-- ── OVERVIEW ── -->
    <div id="tab-overview" class="tab-content active">
      <h1 class="page-title">Overview</h1>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">🔥</div><div><div class="stat-val" id="ov-streak">0</div><div class="stat-lbl">Day Streak</div></div></div>
        <div class="stat-card"><div class="stat-icon">🏆</div><div><div class="stat-val" id="ov-best">0</div><div class="stat-lbl">Best Streak</div></div></div>
        <div class="stat-card"><div class="stat-icon">⏱</div><div><div class="stat-val" id="ov-total">0h</div><div class="stat-lbl">Total Hours</div></div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div><div class="stat-val" id="ov-topics">0</div><div class="stat-lbl">Topics Done</div></div></div>
      </div>
      <div class="progress-cards">
        <div class="prog-card"><div class="prog-hdr"><span>Daily Goal</span><span id="lbl-daily">0/0h</span></div><div class="prog-track"><div class="prog-fill c-blue" id="fill-daily"></div></div><div class="prog-pct" id="pct-daily">0%</div></div>
        <div class="prog-card"><div class="prog-hdr"><span>Weekly Goal</span><span id="lbl-weekly">0/0h</span></div><div class="prog-track"><div class="prog-fill c-purple" id="fill-weekly"></div></div><div class="prog-pct" id="pct-weekly">0%</div></div>
        <div class="prog-card"><div class="prog-hdr"><span>Monthly Goal</span><span id="lbl-monthly">0/0h</span></div><div class="prog-track"><div class="prog-fill c-green" id="fill-monthly"></div></div><div class="prog-pct" id="pct-monthly">0%</div></div>
        <div class="prog-card"><div class="prog-hdr"><span>Semester Goal</span><span id="lbl-semester">0/0h</span></div><div class="prog-track"><div class="prog-fill c-orange" id="fill-semester"></div></div><div class="prog-pct" id="pct-semester">0%</div></div>
      </div>
    </div>

    <!-- ── SUBJECTS ── -->
    <div id="tab-subjects" class="tab-content hidden">
      <div class="page-header">
        <h1 class="page-title">Subjects</h1>
        <button class="add-btn" id="openAddSubject">+ Add Subject</button>
      </div>

      <!-- Add/Edit modal -->
      <div id="subjectModal" class="modal hidden">
        <div class="modal-box">
          <h2 class="modal-title" id="modalTitle">Add Subject</h2>
          <input type="hidden" id="editSubjectId"/>

          <div class="form-row">
            <div class="fg">
              <label>Subject Name</label>
              <input type="text" id="sName" placeholder="e.g. DSA"/>
            </div>
            <div class="fg color-fg">
              <label>Color</label>
              <input type="color" id="sColor" value="#6366f1"/>
            </div>
          </div>
          <div class="form-row">
            <div class="fg">
              <label>Target Hours</label>
              <input type="number" id="sTargetHours" min="1" placeholder="e.g. 80"/>
            </div>
            <div class="fg">
              <label>Complete in (days)</label>
              <input type="number" id="sDeadlineDays" min="1" placeholder="e.g. 30"/>
            </div>
          </div>

          <div class="fg" style="margin-bottom:14px">
            <label>Topics (one per line)</label>
            <textarea id="sTopics" rows="4" placeholder="Binary Search&#10;Recursion&#10;Sorting Algorithms"></textarea>
          </div>

          <div class="modal-actions">
            <button class="modal-cancel" id="cancelSubject">Cancel</button>
            <button class="primary-btn" id="saveSubjectBtn">Save</button>
          </div>
        </div>
      </div>

      <!-- Add Topic to existing subject -->
      <div id="addTopicModal" class="modal hidden">
        <div class="modal-box small">
          <h2 class="modal-title">Add Topic</h2>
          <input type="hidden" id="addTopicSubjectId"/>
          <div class="fg">
            <label>Topic Name</label>
            <input type="text" id="newTopicName" placeholder="e.g. Hashing"/>
          </div>
          <div class="modal-actions">
            <button class="modal-cancel" id="cancelAddTopic">Cancel</button>
            <button class="primary-btn" id="saveTopicBtn">Add</button>
          </div>
        </div>
      </div>

      <div id="subjectCards" class="subject-cards"></div>
    </div>

    <!-- ── TOPIC LOG ── -->
    <div id="tab-topics" class="tab-content hidden">
      <h1 class="page-title">Topic Log</h1>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Topic</th><th>Subject</th><th>Completed At</th></tr></thead>
          <tbody id="topicLogBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── GOALS ── -->
    <div id="tab-goals" class="tab-content hidden">
      <h1 class="page-title">Set Goals</h1>
      <div class="goals-form">
        <div class="fg"><label>Daily Goal (hours)</label><input type="number" id="g-daily" min="1" max="24" step="0.5"/></div>
        <div class="fg"><label>Weekly Goal (hours)</label><input type="number" id="g-weekly" min="1" step="1"/></div>
        <div class="fg"><label>Monthly Goal (hours)</label><input type="number" id="g-monthly" min="1" step="1"/></div>
        <div class="fg"><label>Semester Goal (hours)</label><input type="number" id="g-semester" min="1" step="10"/></div>
        <button class="primary-btn" id="saveGoalsBtn">Save Goals</button>
        <div id="goalMsg" class="msg hidden"></div>
      </div>
    </div>

  </div>

  <script src="../storage/dataManager.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
