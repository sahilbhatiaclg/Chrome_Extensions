<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Tracker</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <div class="header">
    <div class="header-top">
      <div class="logo">
        <span>📚</span>
        <span class="logo-text">Study Tracker</span>
      </div>
      <a href="../dashboard/dashboard.html" target="_blank" class="dash-btn">Dashboard ↗</a>
    </div>
    <div class="streak-row">
      <span>🔥 <span id="curStreak">0</span> day streak</span>
      <span>🏆 Best: <span id="bestStreak">0</span></span>
    </div>
  </div>

  <!-- Summary bar -->
  <div class="summary-row">
    <div class="sum-item"><div class="sum-val" id="todayH">0h</div><div class="sum-lbl">Today</div></div>
    <div class="sum-item"><div class="sum-val" id="weekH">0h</div><div class="sum-lbl">Week</div></div>
    <div class="sum-item"><div class="sum-val" id="monthH">0h</div><div class="sum-lbl">Month</div></div>
  </div>

  <!-- Daily progress -->
  <div class="daily-prog">
    <div class="prog-meta"><span>Daily Goal</span><span id="dpPct">0%</span></div>
    <div class="prog-track"><div class="prog-fill" id="dpBar"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="log">Log Session</button>
    <button class="tab-btn" data-tab="timer">Timer</button>
    <button class="tab-btn" data-tab="topics">Topics</button>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="tab-pane active">
    <div class="form-group">
      <label>Subject</label>
      <select id="logSubject">
        <option value="">— Select —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Hours</label>
      <input type="number" id="logHours" min="0.25" max="12" step="0.25" placeholder="e.g. 1.5"/>
    </div>
    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="logNote" placeholder="What did you study?"/>
    </div>
    <button id="saveLogBtn" class="primary-btn">Save Session ✓</button>
    <div id="logMsg" class="msg hidden"></div>
  </div>

  <!-- TIMER TAB -->
  <div id="tab-timer" class="tab-pane hidden">
    <div class="form-group">
      <label>Subject</label>
      <select id="timerSubject">
        <option value="">— Select —</option>
      </select>
    </div>
    <div class="timer-display" id="timerDisplay">00:00:00</div>
    <div class="timer-sub" id="timerSub">No active session</div>
    <div class="timer-btns">
      <button id="startTimerBtn" class="primary-btn">▶ Start</button>
      <button id="stopTimerBtn" class="danger-btn hidden">■ Stop & Save</button>
    </div>
    <div id="timerMsg" class="msg hidden"></div>
  </div>

  <!-- TOPICS TAB -->
  <div id="tab-topics" class="tab-pane hidden">
    <div class="form-group">
      <label>Subject</label>
      <select id="topicSubject">
        <option value="">— Select —</option>
      </select>
    </div>
    <div id="topicsList" class="topics-list"></div>
  </div>

  <script src="../storage/dataManager.js"></script>
  <script src="popup.js"></script>
</body>
</html>
